<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPARK ⚡ — Design Thinking</title>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,700;0,9..144,900;1,9..144,400;1,9..144,600&family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&family=Caveat:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script>
        window.APP_CONFIG = {
            SUPABASE_URL: "https://vjrvefbdpuoyqpepykam.supabase.co",
            SUPABASE_ANON_KEY: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZqcnZlZmJkcHVveXFwZXB5a2FtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE1Nzk5MjEsImV4cCI6MjA4NzE1NTkyMX0.T3MPWPUetfg-hEdD6O69muJX_y87j0kTvP4_vEOSLD0"
        };
    </script>

    <style>
        :root {
            --bg-creme: #FCF9F5;
            --lynx-orange: #F26522;
            --lynx-orange-dark: #D4541B;
            --spark-blue: #2E3192;
            --text-dark: #1A1A1A;
            --text-light: #666666;
            --border-soft: rgba(0,0,0,0.08);
            --shadow-soft: 0 4px 20px rgba(0,0,0,0.04);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'DM Sans', sans-serif; background: var(--bg-creme); color: var(--text-dark); height: 100vh; display: flex; overflow: hidden; }

        /* --- SIDEBAR --- */
        #sidebar { width: 320px; background: white; border-right: 1px solid var(--border-soft); display: flex; flex-direction: column; padding: 2rem; }
        .logo-area { margin-bottom: 3rem; }
        .logo-lynx { font-family: 'Fraunces', serif; font-weight: 900; font-size: 1.5rem; color: var(--lynx-orange); letter-spacing: -0.5px; }
        .nav-title { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1.5px; color: var(--text-light); margin-bottom: 1.5rem; font-weight: 600; }
        .nav-item { display: flex; align-items: center; padding: 0.85rem 1rem; margin-bottom: 0.5rem; border-radius: 12px; cursor: pointer; transition: all 0.2s; border: 1px solid transparent; }
        .nav-item:hover { background: #FFF5F0; border-color: rgba(242, 101, 34, 0.1); }
        .nav-item.active { background: #FFF5F0; border-color: rgba(242, 101, 34, 0.2); color: var(--lynx-orange); font-weight: 600; }
        .nav-icon { width: 24px; height: 24px; margin-right: 12px; display: flex; align-items: center; justify-content: center; }

        /* --- MAIN CONTENT --- */
        #main-content { flex: 1; display: flex; flex-direction: column; position: relative; }
        #zoneMessages { flex: 1; overflow-y: auto; padding: 3rem 10% 8rem 10%; scroll-behavior: smooth; }

        /* --- BUBBLES --- */
        .msg-container { display: flex; margin-bottom: 2.5rem; animation: fadeInUp 0.4s ease-out forwards; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .msg-av { flex-shrink: 0; width: 48px; height: 48px; border-radius: 16px; margin-right: 1.25rem; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; }
        .msg-av.spark { background: #EEF2FF; color: var(--spark-blue); }
        .msg-av.eleve { background: #FFF5F0; color: var(--lynx-orange); }
        
        .msg-content { max-width: 80%; }
        .msg-author { font-family: 'Fraunces', serif; font-weight: 700; font-size: 1.1rem; margin-bottom: 0.4rem; display: block; }
        .msg-text { font-size: 1.05rem; line-height: 1.6; color: #333; }
        .msg-text p { margin-bottom: 1rem; }
        .msg-text strong { color: var(--text-dark); }
        .msg-text ul, .msg-text ol { margin: 1rem 0 1rem 1.5rem; }
        .msg-text li { margin-bottom: 0.5rem; }

        /* --- INPUT AREA --- */
        #input-area { position: absolute; bottom: 2rem; left: 10%; right: 10%; background: white; border-radius: 20px; padding: 0.6rem; display: flex; align-items: center; box-shadow: 0 10px 40px rgba(0,0,0,0.06); border: 1px solid var(--border-soft); }
        #inputMessage { flex: 1; border: none; padding: 1rem 1.5rem; font-size: 1rem; font-family: inherit; outline: none; }
        #btnEnvoyer { background: var(--lynx-orange); color: white; border: none; padding: 0.8rem 1.8rem; border-radius: 14px; font-weight: 600; cursor: pointer; transition: background 0.2s; margin-left: 0.5rem; }
        #btnEnvoyer:hover { background: var(--lynx-orange-dark); }
        #btnEnvoyer:disabled { background: #ccc; cursor: not-allowed; }

        /* --- CODE VIEW --- */
        #code-overlay { position: fixed; top: 0; right: 0; width: 45%; height: 100vh; background: #1E1E1E; color: #D4D4D4; z-index: 100; transform: translateX(100%); transition: transform 0.3s ease; display: flex; flex-direction: column; border-left: 4px solid var(--lynx-orange); }
        #code-overlay.open { transform: translateX(0); }
        .code-header { padding: 1.5rem; border-bottom: 1px solid #333; display: flex; justify-content: space-between; align-items: center; }
        .code-title { font-family: 'Fraunces', serif; font-size: 1.2rem; color: white; }
        #codeDisplay { flex: 1; padding: 2rem; font-family: 'Courier New', monospace; font-size: 0.9rem; overflow-y: auto; white-space: pre-wrap; line-height: 1.5; }
        .btn-close-code { cursor: pointer; color: #999; }

        #overlay-login { position: fixed; inset: 0; background: var(--bg-creme); z-index: 200; display: flex; align-items: center; justify-content: center; }
        .login-card { background: white; padding: 3rem; border-radius: 30px; box-shadow: var(--shadow-soft); width: 100%; max-width: 450px; text-align: center; border: 1px solid var(--border-soft); }
        .login-card h1 { font-family: 'Fraunces', serif; font-size: 2rem; margin-bottom: 1rem; }
        .login-card p { color: var(--text-light); margin-bottom: 2rem; }
        .login-input { width: 100%; padding: 1rem; border: 1px solid var(--border-soft); border-radius: 12px; margin-bottom: 1.5rem; outline: none; text-align: center; font-size: 1.2rem; letter-spacing: 2px; }
        .login-btn { width: 100%; background: var(--lynx-orange); color: white; padding: 1rem; border-radius: 12px; font-weight: 700; border: none; cursor: pointer; }
    </style>
</head>

<body>

    <div id="overlay-login">
        <div class="login-card">
            <h1>Bienvenue chez LYNX.</h1>
            <p>Entrez votre code équipe pour rejoindre SPARK ⚡</p>
            <input type="text" id="inputCodeEquipe" class="login-input" placeholder="CODE-123" maxlength="10">
            <button id="btnLogin" class="login-btn">LANCER L'EXPÉRIENCE</button>
            <div id="loginError" style="color:red; margin-top:1rem; font-size:0.9rem; display:none;">Code équipe introuvable.</div>
        </div>
    </div>

    <div id="sidebar">
        <div class="logo-area">
            <div class="logo-lynx">LYNX.</div>
        </div>
        <div class="nav-title">Votre Parcours</div>
        <div id="nav-steps"></div>
        <div style="margin-top: auto;">
            <div class="nav-item" onclick="toggleCode()">
                <div class="nav-icon">📄</div>
                <div>Voir le Code HTML</div>
            </div>
            <div class="nav-item" onclick="window.location.reload()">
                <div class="nav-icon">🔄</div>
                <div>Réinitialiser</div>
            </div>
        </div>
    </div>

    <div id="main-content">
        <div id="zoneMessages"></div>
        <div id="input-area">
            <input type="text" id="inputMessage" placeholder="Répondez à SPARK..." autocomplete="off">
            <button id="btnEnvoyer">ENVOYER</button>
        </div>
    </div>

    <div id="code-overlay">
        <div class="code-header">
            <div class="code-title">Structure HTML Cumulée</div>
            <div class="btn-close-code" onclick="toggleCode()">Fermer ✕</div>
        </div>
        <pre id="codeDisplay">Le code s'affichera ici.</pre>
    </div>

    <script>
        const supabaseClient = supabase.createClient(
            window.APP_CONFIG.SUPABASE_URL, 
            window.APP_CONFIG.SUPABASE_ANON_KEY,
            { auth: { persistSession: false } }
        );

        let codeEquipeCourant = "";
        let historiqueChat    = [];
        let sectionsHtml      = {};
        let daProjet          = "";
        let etapeActive       = 0;
        let xp                = 0;

        const LYNX_SM = "⚡";
        const ELEVE_SM = "👤";

        const MASTER_PROMPT = `
        TU ES SPARK, le coach IA de l'agence LYNX. 
        Ton but : guider des étudiants dans la création d'une landing page via le Design Thinking.
        Tu es mentor, pas exécutant. Tu poses des questions, tu valides, et tu co-construis le HTML.

        DÉROULÉ (5 JOURS - 15 ACTIONS) :
        Jour 1 (Empathie) : 1.1 Brief, 1.2 Interview, 1.3 Carte Empathie.
        Jour 2 (Définition) : 2.4 POV, 2.5 HMW, 2.6 Sitemap.
        Jour 3 (Idéation) : 3.7 Brainstorming, 3.8 DA & Moodboard, 3.9 Wireframe HTML (Structure).
        Jour 4 (Prototypage) : 4.10 Hero, 4.11 Features, 4.12 Social Proof.
        Jour 5 (Test & Final) : 5.13 Formulaire, 5.14 Footer, 5.15 Revue finale.

        REGLES CRITIQUES :
        1. Une action à la fois.
        2. Quand tu valides une étape qui produit du contenu visuel, tu GÉNÈRES le bloc HTML correspondant.
        3. Le HTML doit être propre (Tailwind CSS) et contenu entre des balises \`\`\`html ... \`\`\`.
        4. À chaque étape, tu peux demander à l'utilisateur de cliquer sur "Voir le code" pour admirer l'avancée.
        5. Ton ton est encourageant, professionnel (agence) et dynamique.
        `;

        const STEPS = ["Introduction & Brief", "Interview Utilisateur", "Carte d'Empathie", "Point of View (POV)", "How Might We (HMW)", "Architecture (Sitemap)", "Idéation (Brainstorming)", "DA & Moodboard", "Wireframe (Squelette)", "Section HERO", "Section Fonctionnalités", "Preuve Sociale", "Conversion (Formulaire)", "Pied de page (Footer)", "Lancement Final"];

        document.getElementById('btnLogin').addEventListener('click', async () => {
            const input = document.getElementById('inputCodeEquipe');
            const code = input.value.toUpperCase().trim();
            
            // Correction : On retire .single() pour éviter l'erreur 406
            const { data, error } = await supabaseClient
                .from('projets_spark')
                .select('*')
                .eq('code_equipe', code);
            
            if (error || !data || data.length === 0) {
                const errorDiv = document.getElementById('loginError');
                errorDiv.innerText = "Code équipe inconnu. Vérifiez l'orthographe ou créez-le dans Supabase.";
                errorDiv.style.display = 'block';
                return;
            }
            
            // On récupère le premier résultat trouvé
            const projet = data[0];
            
            codeEquipeCourant = code;
            historiqueChat = projet.historique_chat || [];
            sectionsHtml = projet.sections_html || {};
            daProjet = projet.da_projet || "";
            etapeActive = projet.etape_active || 0;
            xp = projet.xp || 0;
            
            document.getElementById('overlay-login').style.display = 'none';
            initialiserInterface();
        });

        function initialiserInterface() {
            mettreAJourSidebar(etapeActive);
            const zone = document.getElementById('zoneMessages');
            zone.innerHTML = ""; 
            
            if (historiqueChat.length === 0) {
                envoyerMessageSpark("Bonjour l'équipe ! Je suis SPARK ⚡, votre coach chez LYNX. Prêts à transformer votre idée en une landing page de folie ? Commençons par le brief : quel est le nom de votre projet et quel problème réglez-vous ?");
            } else {
                historiqueChat.forEach(msg => afficherMessage(msg.auteur, msg.contenu, msg.type));
                mettreAJourCodeCumule();
            }
        }

        async function envoyerMessageEleve() {
            const input = document.getElementById('inputMessage');
            const texte = input.value.trim();
            if (!texte) return;
            input.value = "";
            
            afficherMessage("Vous", texte, "eleve");
            historiqueChat.push({ auteur: "Vous", contenu: texte, type: "eleve" });
            
            const typingId = afficherTyping();
            try {
                const reponseSpark = await appellerGemini();
                supprimerTyping(typingId);
                envoyerMessageSpark(reponseSpark);
                sauvegarderSupabase();
            } catch (err) {
                supprimerTyping(typingId);
                console.error(err);
            }
        }

        function envoyerMessageSpark(texte) {
            afficherMessage("SPARK ⚡", texte, "spark");
            historiqueChat.push({ auteur: "SPARK ⚡", contenu: texte, type: "spark" });
            extraireEtSauvegarderHTML(texte);
        }

        function afficherMessage(auteur, contenu, type) {
            const zone = document.getElementById('zoneMessages');
            const div = document.createElement('div');
            div.className = "msg-container";
            let htmlFormate = contenu.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>').replace(/\n/g, '<br>');
            div.innerHTML = `<div class="msg-av ${type}">${type==='spark'?LYNX_SM:ELEVE_SM}</div><div class="msg-content"><span class="msg-author">${auteur}</span><div class="msg-text">${htmlFormate}</div></div>`;
            zone.appendChild(div);
            zone.scrollTop = zone.scrollHeight;
        }

        async function appellerGemini() {
            let contents = [];
            for (const msg of historiqueChat.slice(-10)) {
                let texte = msg.contenu;
                if (msg.type === 'spark') {
                    texte = texte.replace(/```html[\s\S]*?```/gi, '[Code HTML généré]');
                }
                contents.push({ role: msg.type === 'eleve' ? 'user' : 'model', parts: [{ text: texte }] });
            }

            const response = await fetch(`${window.APP_CONFIG.SUPABASE_URL}/functions/v1/gemini-proxy`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    contents, 
                    system_instruction: { parts: [{ text: MASTER_PROMPT + `\nÉTAT ACTUEL : Étape ${etapeActive + 1}` }] } 
                })
            });
            const data = await response.json();
            return data.candidates[0].content.parts[0].text;
        }

        function extraireEtSauvegarderHTML(texte) {
            const regex = /```html([\s\S]*?)```/g;
            let match;
            while ((match = regex.exec(texte)) !== null) { sectionsHtml[etapeActive] = match[1].trim(); }
            mettreAJourCodeCumule();
        }

        function mettreAJourCodeCumule() {
            let codeFinal = `<!DOCTYPE html>\n<html>\n<head><script src="https://cdn.tailwindcss.com"><\/script></head>\n<body>\n`;
            Object.keys(sectionsHtml).sort((a,b) => a-b).forEach(key => {
                codeFinal += `\n\n` + sectionsHtml[key] + "\n";
            });
            codeFinal += `\n</body>\n</html>`;
            document.getElementById('codeDisplay').innerText = codeFinal;
        }

        function toggleCode() { document.getElementById('code-overlay').classList.toggle('open'); }

        function mettreAJourSidebar(idx) {
            const container = document.getElementById('nav-steps');
            container.innerHTML = "";
            STEPS.forEach((step, i) => {
                const div = document.createElement('div');
                div.className = `nav-item ${i === idx ? 'active' : ''}`;
                div.innerHTML = `<div class="nav-icon">${i < idx ? '✅' : '○'}</div><div>${step}</div>`;
                container.appendChild(div);
            });
        }

        document.getElementById('btnEnvoyer').addEventListener('click', envoyerMessageEleve);
        document.getElementById('inputMessage').addEventListener('keypress', (e) => { if(e.key === 'Enter') envoyerMessageEleve(); });

        function afficherTyping() {
            const zone = document.getElementById('zoneMessages');
            const id = 'typing-' + Date.now();
            const div = document.createElement('div');
            div.id = id; div.className = 'typing-bubble';
            div.innerHTML = `<div class="msg-av spark">${LYNX_SM}</div><div class="typing-dots"><span></span><span></span><span></span></div>`;
            zone.appendChild(div); zone.scrollTop = zone.scrollHeight;
            return id;
        }

        function supprimerTyping(id) { const el = document.getElementById(id); if (el) el.remove(); }

        async function sauvegarderSupabase() {
            if (!codeEquipeCourant) return;
            await supabaseClient.from('projets_spark').update({
                historique_chat: historiqueChat,
                sections_html: sectionsHtml,
                da_projet: daProjet,
                etape_active: etapeActive,
                xp: xp
            }).eq('code_equipe', codeEquipeCourant);
        }
        
        mettreAJourSidebar(0);
    </script>
</body>
</html>
