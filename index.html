    <style>
        :root {
            --bg-creme: #FCF9F5;
            --lynx-orange: #F26522;

            --spark-blue: #2E3192;
            --spark-blue-dark: #1A1C5A;
            --text-dark: #1A1A1A;

        * {

        body {
            font-family: 'DM Sans', sans-serif;

        /* -------------------------------------------
           ÉCRAN DE CONNEXION (LOGIN OVERLAY)
        ------------------------------------------- */
        #overlay-login {
            position: fixed;
            inset: 0;
            background: var(--spark-blue);
            z-index: 200;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .login-particles {
            position: absolute;
            inset: 0;
            pointer-events: none;
            overflow: hidden;
            z-index: 0;
        }
        .particle {
            position: absolute;
            background: rgba(255,255,255,0.05);
            border-radius: 50%;
            animation: floatUp 15s infinite linear;
        }
        @keyframes floatUp {
            0%   { transform: translateY(100vh) scale(0.5); opacity: 0; }
            20%  { opacity: 1; }
            80%  { opacity: 1; }
            100% { transform: translateY(-20vh) scale(1.5); opacity: 0; }
        }

        .login-card {
            background: white;
            padding: 3.5rem 3rem;
            border-radius: 24px;
            box-shadow: var(--shadow-float);
            width: 100%;
            max-width: 420px;
            text-align: center;
            position: relative;
            z-index: 1;
            transform: translateY(0);
            animation: slideUpFade 0.6s ease-out;
        }

        @keyframes slideUpFade {
            from { opacity: 0; transform: translateY(30px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .login-card .logo-lynx {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
            color: var(--spark-blue);
        }

        .login-card h1 {
            font-family: 'Fraunces', serif;
            font-size: 1.8rem;
            margin-bottom: 0.5rem;
            color: var(--text-dark);
        }

        .login-card p {
            color: var(--text-light);
            margin-bottom: 2.5rem;
            font-size: 1.05rem;
        }

        .login-input-group {
            position: relative;
            margin-bottom: 1.5rem;
        }

        .login-input {
            width: 100%;
            padding: 1.2rem;
            border: 2px solid var(--border-soft);
            border-radius: 16px;
            outline: none;
            text-align: center;
            font-size: 1.25rem;
            letter-spacing: 3px;
            font-weight: 600;
            transition: all 0.3s;
            font-family: inherit;
        }
        .login-input:focus {
            border-color: var(--spark-blue);
            box-shadow: 0 0 0 4px rgba(46, 49, 146, 0.1);
        }
        .login-input::placeholder {
            letter-spacing: normal;
            font-weight: 400;
            color: #aaa;
        }

        .login-btn {
            width: 100%;
            background: var(--lynx-orange);
            color: white;

            border-radius: 16px;

        }

        #loginError {

            margin-top: 1rem;
            font-size: 0.95rem;
            display: none;
            font-weight: 500;

        /* -------------------------------------------
           SIDEBAR GAUCHE (MENU)
        ------------------------------------------- */

        }

        .sidebar-bottom {

            padding-top: 1.5rem;
            border-top: 1px solid var(--border-soft);
        }

        /* -------------------------------------------
           ZONE PRINCIPALE (CHAT)
        ------------------------------------------- */
        #main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
            background: var(--bg-creme);
        }

        #zoneMessages {
            flex: 1;
            overflow-y: auto;

            scroll-behavior: smooth;
        }

        .msg-container {
            display: flex;
            margin-bottom: 2.5rem;
            animation: fadeInUp 0.4s ease-out forwards;
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(15px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        
        .msg-container.eleve {
            flex-direction: row-reverse;
        }

        .msg-av {
            flex-shrink: 0;
            width: 48px;
            height: 48px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }
        .msg-container.spark .msg-av {
            background: white;
            border: 2px solid var(--spark-blue);
            color: var(--spark-blue);

        }
        .msg-container.eleve .msg-av {
            background: var(--lynx-orange);

            margin-left: 1.5rem;

        .msg-content {
            max-width: 80%;
            background: white;
            padding: 1.5rem;
            border-radius: 20px;
            box-shadow: var(--shadow-soft);
            border: 1px solid var(--border-soft);

        .msg-container.spark .msg-content {

        }
        .msg-container.eleve .msg-content {
            border-top-right-radius: 4px;
            background: #FFF5F0;
            border-color: rgba(242,101,34,0.1);

        .msg-author {
            font-family: 'Fraunces', serif;

            font-size: 1.1rem;
            margin-bottom: 0.6rem;
            display: block;

        .msg-container.spark .msg-author { color: var(--spark-blue); }
        .msg-container.eleve .msg-author { color: var(--lynx-orange); text-align: right; }

        .msg-text {
            font-size: 1.05rem;
            line-height: 1.6;
            color: #333;
        }
        .msg-text p { margin-bottom: 1rem; }
        .msg-text p:last-child { margin-bottom: 0; }
        .msg-text strong { color: var(--text-dark); font-weight: 600; }
        
        .msg-text ul, .msg-text ol { margin: 1rem 0 1rem 1.5rem; }
        .msg-text li { margin-bottom: 0.5rem; }

        .typing-bubble .msg-content {
            display: flex;
            align-items: center;
            padding: 1.2rem 1.5rem;
        }
        .typing-dots { display: flex; gap: 6px; }
        .typing-dots span {
            width: 8px; height: 8px;
            background: var(--spark-blue);
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
        }
        .typing-dots span:nth-child(1) { animation-delay: -0.32s; }
        .typing-dots span:nth-child(2) { animation-delay: -0.16s; }
        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }

        /* -------------------------------------------
           ZONE DE SAISIE (INPUT)
        ------------------------------------------- */
        #input-area-container {
            position: absolute;
            bottom: 0;
            left: 0; right: 0;
            padding: 2rem 15%;
            background: linear-gradient(to top, var(--bg-creme) 60%, transparent);
            pointer-events: none;
        }

        #input-wrapper {
            background: white;
            border-radius: 24px;
            padding: 0.6rem 0.6rem 0.6rem 1.5rem;
            display: flex;
            align-items: center;
            box-shadow: var(--shadow-float);
            border: 1px solid var(--border-soft);
            pointer-events: auto;
            transition: all 0.3s;
        }
        #input-wrapper:focus-within {
            border-color: var(--lynx-orange);
            box-shadow: 0 10px 40px rgba(242, 101, 34, 0.15);
        }

        #inputMessage {
            flex: 1;
            border: none;
            font-size: 1.05rem;
            font-family: inherit;
            outline: none;
            background: transparent;
            color: var(--text-dark);
        }
        #inputMessage::placeholder { color: #aaa; }

        #btnEnvoyer {
            background: var(--lynx-orange);
            color: white;
            border: none;
            width: 50px;
            height: 50px;
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            margin-left: 10px;
        }
        #btnEnvoyer svg { width: 24px; height: 24px; fill: currentColor; }
        #btnEnvoyer:hover {
            background: var(--lynx-orange-dark);
            transform: scale(1.05);
        }
        #btnEnvoyer:disabled {
            background: #ccc; cursor: not-allowed; transform: none;
        }

        /* -------------------------------------------
           PANNEAU CODE HTML (SLIDE OVER)
        ------------------------------------------- */
        #code-overlay {
            position: fixed;
            top: 0; right: 0;
            width: 45%; min-width: 500px; max-width: 800px;
            height: 100vh;
            background: #1E1E1E;
            color: #D4D4D4;
            z-index: 100;
            transform: translateX(100%);
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            display: flex;
            flex-direction: column;
            border-left: 1px solid #333;
            box-shadow: -10px 0 40px rgba(0,0,0,0.2);
        }
        #code-overlay.open {
            transform: translateX(0);
        }

        .code-header {
            padding: 1.5rem 2rem;
            background: #252526;
            border-bottom: 1px solid #333;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .code-title {
            font-family: 'Fraunces', serif;
            font-size: 1.2rem;
            color: white;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .code-actions { display: flex; gap: 15px; }
        
        .btn-icon {
            background: none; border: none;
            color: #aaa; font-family: inherit;
            font-size: 0.9rem; cursor: pointer;
            display: flex; align-items: center; gap: 6px;
            transition: color 0.2s;
        }
        .btn-icon:hover { color: white; }

        .code-content-wrapper {
            flex: 1;
            overflow-y: auto;
            padding: 2rem;
            background: #1E1E1E;
        }

        #codeDisplay {
            font-family: 'Consolas', 'Courier New', monospace;
            font-size: 0.95rem;
            line-height: 1.6;
            white-space: pre-wrap;
            word-break: break-all;
            color: #9CDCFE;
        }

        @media (max-width: 1024px) {
            #code-overlay { width: 60%; min-width: auto; }
            #zoneMessages { padding: 2rem 5% 8rem 5%; }
            #input-area-container { padding: 1.5rem 5%; }
        }
        @media (max-width: 768px) {
            body { flex-direction: column; }
            #sidebar { width: 100%; height: auto; border-right: none; border-bottom: 1px solid var(--border-soft); padding: 1rem; flex-direction: row; align-items: center; justify-content: space-between; }
            .logo-area { margin-bottom: 0; }
            #nav-steps { display: none; }
            .sidebar-bottom { margin-top: 0; padding-top: 0; border: none; display: flex; }
            #code-overlay { width: 100%; }
        }
    </style>
</head>

                    <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg>
                    Copier
                </button>
                <button class="btn-icon" onclick="toggleCode()">
                    <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
                </button>

    <script>
        function genererParticules() {
            const container = document.getElementById('particles-container');
            for(let i=0; i<15; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                const size = Math.random() * 40 + 10;
                p.style.width = size + 'px';
                p.style.height = size + 'px';
                p.style.left = Math.random() * 100 + '%';
                p.style.animationDuration = (Math.random() * 10 + 10) + 's';
                p.style.animationDelay = (Math.random() * 5) + 's';
                container.appendChild(p);
            }
        }
        genererParticules();

        // Sécurité et correction 401
        const supabaseClient = supabase.createClient(
            window.APP_CONFIG.SUPABASE_URL, 
            window.APP_CONFIG.SUPABASE_ANON_KEY,
            { auth: { persistSession: false } }
        );

        let codeEquipeCourant = "";
        let historiqueChat    = [];
        let sectionsHtml      = {}; 
        let daProjet          = "";
        let etapeActive       = 0;
        let xp                = 0;

        const LYNX_SM = "⚡";
        const ELEVE_SM = "👤";

        // MASTER PROMPT COMPLET ET ORIGINAL
        const MASTER_PROMPT = `
        TU ES SPARK, le coach IA de l'agence LYNX. 
        Ton but : guider des étudiants dans la création d'une landing page via le Design Thinking.
        Tu es mentor, pas exécutant. Tu poses des questions, tu valides, et tu co-construis le HTML.

        DÉROULÉ (5 JOURS - 15 ACTIONS) :
        Jour 1 (Empathie) : 1.1 Brief, 1.2 Interview, 1.3 Carte Empathie.
        Jour 2 (Définition) : 2.4 POV, 2.5 HMW, 2.6 Sitemap.
        Jour 3 (Idéation) : 3.7 Brainstorming, 3.8 DA & Moodboard, 3.9 Wireframe HTML (Structure).
        Jour 4 (Prototypage) : 4.10 Hero, 4.11 Features, 4.12 Social Proof.
        Jour 5 (Test & Final) : 5.13 Formulaire, 5.14 Footer, 5.15 Revue finale.

        REGLES CRITIQUES :
        1. Une action à la fois.
        2. Quand tu valides une étape qui produit du contenu visuel, tu GÉNÈRES le bloc HTML correspondant.
        3. Le HTML doit être propre (Tailwind CSS) et contenu entre des balises \`\`\`html ... \`\`\`.
        4. À chaque étape, tu peux demander à l'utilisateur de cliquer sur "Voir le code" pour admirer l'avancée.
        5. Ton ton est encourageant, professionnel (agence) et dynamique.
        `;

        const STEPS = [
            "Introduction & Brief", "Interview Utilisateur", "Carte d'Empathie", 
            "Point of View (POV)", "How Might We (HMW)", "Architecture (Sitemap)", 
            "Idéation", "DA & Moodboard", "Wireframe (Structure)", 
            "Section HERO", "Section Fonctionnalités", "Preuve Sociale", 
            "Conversion (Formulaire)", "Pied de page (Footer)", "Revue Finale"
        ];

        // Sécurité login : array au lieu de single()
        document.getElementById('btnLogin').addEventListener('click', async () => {
            const codeInput = document.getElementById('inputCodeEquipe').value.toUpperCase().trim();
            if(!codeInput) return;

            const btn = document.getElementById('btnLogin');
            const originalText = btn.innerHTML;
            btn.innerHTML = 'Connexion... <span class="typing-dots" style="display:inline-flex;margin-left:10px;"><span></span><span></span><span></span></span>';
            btn.disabled = true;

            const { data, error } = await supabaseClient
                .from('projets_spark')
                .select('*')
                .eq('code_equipe', codeInput);

            if (error || !data || data.length === 0) {
                const errorDiv = document.getElementById('loginError');
                errorDiv.innerText = "Code équipe inconnu. Vérifiez l'orthographe ou créez-le dans Supabase.";
                errorDiv.style.display = 'block';
                btn.innerHTML = originalText;
                btn.disabled = false;
                return;
            }

            const projet = data[0];

            codeEquipeCourant = codeInput;
            historiqueChat    = projet.historique_chat || [];
            sectionsHtml      = projet.sections_html   || {};
            daProjet          = projet.da_projet       || "";
            etapeActive       = projet.etape_active    || 0;
            xp                = projet.xp              || 0;

            document.getElementById('overlay-login').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('overlay-login').style.display = 'none';
                initialiserInterface();
            }, 500);
        });

        document.getElementById('inputCodeEquipe').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') document.getElementById('btnLogin').click();
        });

        function initialiserInterface() {
            mettreAJourSidebar(etapeActive);
            document.getElementById('zoneMessages').innerHTML = ""; 
            
            if (historiqueChat.length === 0) {
                const msgIntro = "Bonjour l'équipe ! 🚀 Je suis SPARK ⚡, votre Lead Designer chez LYNX. Prêts à créer une landing page qui déchire ?\n\nPour commencer la phase d'**Empathie**, parlez-moi de votre projet : **Quel est le nom de votre produit/service et quel problème précis essayez-vous de résoudre pour vos utilisateurs ?**";
                envoyerMessageSpark(msgIntro);
            } else {
                historiqueChat.forEach(msg => afficherMessage(msg.auteur, msg.contenu, msg.type));
                mettreAJourCodeCumule(false);
            }
        }

        async function envoyerMessageEleve() {
            const input = document.getElementById('inputMessage');
            const texte = input.value.trim();
            const btnEnvoyer = document.getElementById('btnEnvoyer');
            
            if (!texte) return;
            
            input.value = "";
            input.disabled = true;
            btnEnvoyer.disabled = true;
            
            afficherMessage("Vous", texte, "eleve");
            historiqueChat.push({ auteur: "Vous", contenu: texte, type: "eleve" });
            
            const typingId = afficherTyping();
            
            try {
                // CHANGEMENT: Appel à Mistral au lieu de Gemini
                const reponseSpark = await appellerMistral();
                supprimerTyping(typingId);
                
                envoyerMessageSpark(reponseSpark);
                
                if(reponseSpark.toLowerCase().includes("étape suivante") || reponseSpark.toLowerCase().includes("parfait")) {
                    if(etapeActive < STEPS.length - 1) etapeActive++;
                }
                mettreAJourSidebar(etapeActive);
                
                sauvegarderSupabase();
            } catch (err) {
                supprimerTyping(typingId);
                console.error("Erreur appel IA:", err);
                envoyerMessageSpark("Oups, j'ai eu un petit bug de connexion avec le serveur IA. Tu peux reformuler ?");
            } finally {
                input.disabled = false;
                btnEnvoyer.disabled = false;
                input.focus();
            }
        }

        function envoyerMessageSpark(texte) {
            afficherMessage("SPARK ⚡", texte, "spark");
            historiqueChat.push({ auteur: "SPARK ⚡", contenu: texte, type: "spark" });
            extraireEtSauvegarderHTML(texte);
        }

        function afficherMessage(auteur, contenu, type) {
            const zone = document.getElementById('zoneMessages');
            const div = document.createElement('div');
            div.className = `msg-container ${type}`;
            
            let htmlFormate = contenu
                .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                .replace(/\n/g, '<br>');

            if (type === 'spark') {
                htmlFormate = htmlFormate.replace(/```html[\s\S]*?```/g, '<div style="background:#EEF2FF; padding:10px; border-radius:8px; border-left:4px solid var(--spark-blue); margin:10px 0; font-family:monospace; font-size:0.9rem;">&lt;/&gt; Code généré avec succès. Cliquez sur l\'onglet Code HTML à gauche !</div>');
                htmlFormate = htmlFormate.replace(/```/g, '');
            }

            div.innerHTML = `
                <div class="msg-av">${type==='spark'?LYNX_SM:ELEVE_SM}</div>
                <div class="msg-content">
                    <span class="msg-author">${auteur}</span>
                    <div class="msg-text">${htmlFormate}</div>
                </div>
            `;
            zone.appendChild(div);
            
            setTimeout(() => {
                zone.scrollTo({
                    top: zone.scrollHeight,
                    behavior: 'smooth'
                });
            }, 50);
        }

        // ─────────────────────────────────────────────
        // NOUVELLE FONCTION D'APPEL MISTRAL
        // ─────────────────────────────────────────────
        async function appellerMistral() {
            const promptSysteme = MASTER_PROMPT + `\n\nÉTAT ACTUEL : Tu discutes avec l'équipe "${codeEquipeCourant}". Vous êtes à l'étape ${etapeActive + 1} : ${STEPS[etapeActive]}.`;

            // 1. Initialiser le tableau de requêtes avec le prompt système
            const messages = [{ role: 'system', content: promptSysteme }];

            // 2. Ajouter l'historique récent formaté pour Mistral
            const historiqueRecent = historiqueChat.slice(-10).map(msg => {
                let texte = msg.contenu;
                if (msg.type === 'spark') {
                    // Masquer le code source long pour économiser les tokens
                    texte = texte.replace(/```html[\s\S]*?```/gi, '[Code HTML généré et sauvegardé]');
                }
                return {
                    // Les rôles Mistral : 'user' et 'assistant'
                    role: msg.type === 'eleve' ? 'user' : 'assistant',
                    content: texte
                };
            });

            messages.push(...historiqueRecent);

            // 3. Appel à la nouvelle Edge Function (mistral-proxy)
            // Note: N'oublie pas de renommer ta fonction Supabase en "mistral-proxy" ou ajuste le nom ci-dessous.
            const response = await fetch(`${window.APP_CONFIG.SUPABASE_URL}/functions/v1/mistral-proxy`, {
                method: 'POST',
                headers: { 
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${window.APP_CONFIG.SUPABASE_ANON_KEY}`
                },
                body: JSON.stringify({ 
                    messages: messages,
                    temperature: 0.9,
                    max_tokens: 2048
                })
            });
            
            if(!response.ok) {
                const errData = await response.json().catch(() => ({}));
                throw new Error(errData.error?.message || "Erreur réseau API Mistral");
            }
            
            const data = await response.json();
            
            // 4. Lecture de la réponse selon le format Mistral
            if (data.choices?.[0]?.message?.content) {
                return data.choices[0].message.content;
            } else if (data.choices?.[0]?.finish_reason) {
                throw new Error(`Réponse bloquée (raison: ${data.choices[0].finish_reason}).`);
            } else {
                throw new Error("Format de réponse Mistral inattendu.");
            }
        }

        function extraireEtSauvegarderHTML(texte) {
            const regex = /```html([\s\S]*?)```/g;
            let match;
            let codeTrouve = false;
            
            while ((match = regex.exec(texte)) !== null) { 
                sectionsHtml[etapeActive] = match[1].trim(); 
                codeTrouve = true;
            }
            
            if(codeTrouve) {
                mettreAJourCodeCumule(true);
            }
        }

        function mettreAJourCodeCumule(showBadge = false) {
            let codeFinal = `<!DOCTYPE html>\n<html lang="fr">\n<head>\n  <meta charset="UTF-8">\n  <meta name="viewport" content="width=device-width, initial-scale=1.0">\n  <script src="https://cdn.tailwindcss.com"><\/script>\n  <title>Projet ${codeEquipeCourant}</title>\n</head>\n<body>\n`;
            
            Object.keys(sectionsHtml).sort((a,b) => a-b).forEach(key => {
                codeFinal += `\n  \n  ${sectionsHtml[key].replace(/\n/g, '\n  ')}\n`;
            });
            
            codeFinal += `\n</body>\n</html>`;
            
            const escapedCode = codeFinal.replace(/</g, "&lt;").replace(/>/g, "&gt;");
            document.getElementById('codeDisplay').innerHTML = escapedCode;

            if(showBadge) {
                const badge = document.getElementById('code-badge');
                badge.style.display = 'inline-block';
                badge.animate([
                    { transform: 'scale(1)' },
                    { transform: 'scale(1.2)' },
                    { transform: 'scale(1)' }
                ], { duration: 300, iterations: 3 });
            }
        }

        function toggleCode() { 
            document.getElementById('code-overlay').classList.toggle('open'); 
            document.getElementById('code-badge').style.display = 'none'; 
        }

        function copierCode() {
            let codeFinal = `<!DOCTYPE html>\n<html lang="fr">\n<head>\n  <meta charset="UTF-8">\n  <script src="https://cdn.tailwindcss.com"><\/script>\n</head>\n<body>\n`;
            Object.keys(sectionsHtml).sort((a,b) => a-b).forEach(key => {
                codeFinal += `\n\n${sectionsHtml[key]}\n`;
            });
            codeFinal += `\n</body>\n</html>`;

            navigator.clipboard.writeText(codeFinal).then(() => {
                alert("Code HTML copié dans le presse-papier !");
            });
        }

        function mettreAJourSidebar(idx) {
            const container = document.getElementById('nav-steps');
            container.innerHTML = "";
            STEPS.forEach((step, i) => {
                const div = document.createElement('div');
                
                let etatClass = '';
                let icone = '○';
                
                if (i < idx) {
                    etatClass = 'done';
                    icone = '✓';
                } else if (i === idx) {
                    etatClass = 'active';
                    icone = '⚡';
                }

                div.className = `nav-item ${etatClass}`;
                div.innerHTML = `
                    <div class="nav-icon" style="${i<idx?'color:var(--spark-blue);':''}">${icone}</div>
                    <div>${step}</div>
                `;
                container.appendChild(div);
            });
        }

        document.getElementById('btnEnvoyer').addEventListener('click', envoyerMessageEleve);
        document.getElementById('inputMessage').addEventListener('keypress', (e) => { 
            if(e.key === 'Enter' && !document.getElementById('btnEnvoyer').disabled) envoyerMessageEleve(); 
        });

        function afficherTyping() {
            const zone = document.getElementById('zoneMessages');
            const id   = 'typing-' + Date.now();
            const div  = document.createElement('div');
            div.id = id;
            div.className = 'msg-container spark typing-bubble';
            div.innerHTML = `
                <div class="msg-av">${LYNX_SM}</div>
                <div class="msg-content">
                    <div class="typing-dots"><span></span><span></span><span></span></div>
                </div>`;
            zone.appendChild(div);
            zone.scrollTop = zone.scrollHeight;
            return id;
        }

        function supprimerTyping(id) {
            const el = document.getElementById(id);
            if (el) el.remove();
        }

        async function sauvegarderSupabase() {
            if (!codeEquipeCourant) return;
            const { error } = await supabaseClient
                .from('projets_spark')
                .update({
                    historique_chat: historiqueChat,
                    sections_html:   sectionsHtml,
                    da_projet:       daProjet,
                    etape_active:    etapeActive,
                    xp:              xp
                })
                .eq('code_equipe', codeEquipeCourant);
            if (error) console.error('Erreur sauvegarde Supabase :', error);
        }

        mettreAJourSidebar(0);

    </script>
</body>
</html>
